<details style="
  margin: 1em 0;
  border: 1px solid #aaa;
  border-radius: 4px;
  padding: 0.5em 1em;
">
  <summary style="cursor: pointer; font-weight: bold;">▼ {{ .Get 0 }}</summary>
  <div style="
    margin-top: 0.5em;
    padding-top: 0.5em;
    border-top: 1px solid #aaa;
  ">
    {{ .Inner | markdownify }}
  </div>
</details>
